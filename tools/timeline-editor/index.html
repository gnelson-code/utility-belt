<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Timeline Editor</title>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --border: #e5e7eb;
      --border-strong: #d1d5db;
      --bg: #ffffff;
      --bg-subtle: #f9fafb;
      --bg-sunken: #f3f4f6;
      --text: #111827;
      --text-muted: #6b7280;
      --accent: #2563eb;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg-subtle);
      overflow: hidden;
    }
    #root { height: 100%; display: flex; flex-direction: column; }
    header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      margin: 0 12px 0 0;
    }
    header .spacer { flex: 1; }
    header input[type="text"].title-input {
      font-size: 15px;
      font-weight: 600;
      border: 1px solid transparent;
      background: transparent;
      padding: 4px 6px;
      border-radius: 4px;
      min-width: 300px;
    }
    header input[type="text"].title-input:hover { border-color: var(--border); }
    header input[type="text"].title-input:focus { border-color: var(--accent); outline: none; background: var(--bg); }
    button {
      font: inherit;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { background: var(--bg-sunken); }
    button.primary { background: var(--accent); color: white; border-color: var(--accent); }
    button.primary:hover { background: #1d4ed8; }
    button.icon { padding: 4px 8px; font-size: 13px; }
    button.danger { color: var(--danger); border-color: #fecaca; }
    button.danger:hover { background: var(--danger-bg); }

    .error-banner {
      background: var(--danger-bg);
      color: var(--danger);
      padding: 10px 16px;
      border-bottom: 1px solid #fecaca;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .error-banner pre {
      margin: 0;
      font-family: inherit;
      font-size: 13px;
      white-space: pre-wrap;
      flex: 1;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: var(--left-width, 42%) 6px 1fr;
      min-height: 0;
      overflow: hidden;
    }

    .pane {
      background: var(--bg);
      overflow: auto;
      min-width: 0;
    }
    .pane.left {
      border-right: 1px solid var(--border);
    }
    .divider {
      background: var(--border);
      cursor: col-resize;
      position: relative;
    }
    .divider:hover, .divider.dragging { background: var(--accent); }

    table.tasks {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
    }
    table.tasks thead th {
      background: var(--bg-subtle);
      text-align: left;
      font-weight: 600;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    table.tasks tbody td {
      padding: 4px 6px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    table.tasks tbody tr.group-header td {
      background: var(--bg-subtle);
      font-weight: 600;
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 6px 10px;
    }
    table.tasks input[type="text"],
    table.tasks input[type="date"],
    table.tasks select {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      padding: 4px 6px;
      border-radius: 4px;
      font: inherit;
      color: inherit;
    }
    table.tasks input[type="text"]:hover,
    table.tasks input[type="date"]:hover,
    table.tasks select:hover {
      border-color: var(--border);
    }
    table.tasks input[type="text"]:focus,
    table.tasks input[type="date"]:focus,
    table.tasks select:focus {
      border-color: var(--accent);
      background: var(--bg);
      outline: none;
    }
    table.tasks td.name-col { min-width: 200px; }
    table.tasks td.date-col input { min-width: 120px; }
    table.tasks td.actions-col { width: 28px; text-align: center; }
    table.tasks td.actions-col button {
      border: none;
      background: transparent;
      color: var(--text-muted);
      padding: 2px 6px;
      font-size: 16px;
      line-height: 1;
    }
    table.tasks td.actions-col button:hover { color: var(--danger); background: var(--danger-bg); }

    .drop-overlay {
      position: fixed;
      inset: 0;
      background: rgba(37, 99, 235, 0.08);
      border: 3px dashed var(--accent);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      color: var(--accent);
      pointer-events: none;
    }
    .empty-state {
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    /* =========================================================
       Constants
       ========================================================= */

    const STATUS_ORDER = [
      'not_started', 'in_progress', 'complete', 'at_risk', 'blocked', 'delayed', 'estimate'
    ];

    const STATUS_LABEL = {
      not_started: 'Not Started',
      in_progress: 'In Progress',
      complete:    'Complete',
      at_risk:     'At Risk',
      blocked:     'Blocked',
      delayed:     'Delayed',
      estimate:    'Estimate',
    };

    const STATUS_COLORS = {
      not_started: '#9CA3AF', // gray
      in_progress: '#3B82F6', // blue
      complete:    '#10B981', // green
      at_risk:     '#F59E0B', // amber
      blocked:     '#EC4899', // pink
      delayed:     '#F97316', // orange
      estimate:    '#A78BFA', // violet (dashed)
    };

    const EXCEL_SYNONYMS = {
      name:       ['task', 'task name', 'name', 'activity', 'project', 'project name'],
      workstream: ['workstream', 'group', 'category', 'swimlane', 'team', 'function'],
      start:      ['start', 'start date', 'begin', 'begin date'],
      end:        ['end', 'end date', 'finish', 'finish date'],
      duration:   ['duration', 'days', 'length'],
      status:     ['status', 'state'],
    };

    const STATUS_ALIAS_MAP = (() => {
      const m = {};
      const add = (aliases, canonical) => aliases.forEach(a => { m[a.toLowerCase().replace(/[\s\-_]+/g, '')] = canonical; });
      add(['notstarted', 'todo', 'pending', 'new', 'open'], 'not_started');
      add(['inprogress', 'wip', 'active', 'ongoing', 'started'], 'in_progress');
      add(['complete', 'completed', 'done', 'finished', 'closed'], 'complete');
      add(['atrisk', 'risk', 'warning'], 'at_risk');
      add(['blocked', 'block', 'stuck'], 'blocked');
      add(['delayed', 'late', 'slipping', 'slipped'], 'delayed');
      add(['estimate', 'estimated', 'forecast', 'tbd', 'tentative'], 'estimate');
      return m;
    })();

    /* =========================================================
       Fallback sample (used when fetch() of sample-timeline.yaml
       fails — which happens on file:// in Chrome)
       ========================================================= */

    const FALLBACK_SAMPLE = {
      title: "Sample Biotech Program Timeline",
      workstreams: [
        { id: 'cmc', name: 'CMC', collapsed: false },
        { id: 'clinical', name: 'Clinical', collapsed: false },
        { id: 'regulatory', name: 'Regulatory', collapsed: false },
      ],
      tasks: [
        { id: 't-001', name: 'Process development', workstream: 'cmc',        start: '2026-01-05', end: '2026-04-30', status: 'complete',    milestone: false },
        { id: 't-002', name: 'Process validation',  workstream: 'cmc',        start: '2026-04-15', end: '2026-08-30', status: 'in_progress', milestone: false },
        { id: 't-003', name: 'Stability studies',   workstream: 'cmc',        start: '2026-05-01', end: '2026-11-15', status: 'at_risk',     milestone: false },
        { id: 't-004', name: 'GMP release',         workstream: 'cmc',        start: '2026-11-15', end: '2026-11-15', status: 'not_started', milestone: true  },
        { id: 't-005', name: 'Protocol finalization', workstream: 'clinical', start: '2026-02-01', end: '2026-03-31', status: 'complete',    milestone: false },
        { id: 't-006', name: 'Site activation',     workstream: 'clinical',   start: '2026-04-01', end: '2026-07-15', status: 'delayed',     milestone: false },
        { id: 't-007', name: 'First patient in',    workstream: 'clinical',   start: '2026-07-15', end: '2026-07-15', status: 'not_started', milestone: true  },
        { id: 't-008', name: 'Enrollment',          workstream: 'clinical',   start: '2026-07-15', end: '2027-03-30', status: 'estimate',    milestone: false },
        { id: 't-009', name: 'Pre-IND meeting prep',workstream: 'regulatory', start: '2026-02-15', end: '2026-04-15', status: 'complete',    milestone: false },
        { id: 't-010', name: 'IND writing',         workstream: 'regulatory', start: '2026-04-15', end: '2026-09-15', status: 'blocked',     milestone: false },
        { id: 't-011', name: 'IND submission',      workstream: 'regulatory', start: '2026-09-30', end: '2026-09-30', status: 'not_started', milestone: true  },
        { id: 't-012', name: 'FDA response',        workstream: 'regulatory', start: '2026-09-30', end: '2026-11-30', status: 'estimate',    milestone: false },
      ],
    };

    /* =========================================================
       Date helpers — all internal state uses ISO "YYYY-MM-DD"
       ========================================================= */

    function toIsoDate(v) {
      if (v == null || v === '') return null;
      if (v instanceof Date && !isNaN(v)) {
        const y = v.getUTCFullYear();
        const m = String(v.getUTCMonth() + 1).padStart(2, '0');
        const d = String(v.getUTCDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      }
      if (typeof v === 'number') {
        // Excel serial date (days since 1899-12-30, accounting for Lotus 1-2-3 bug)
        const ms = Math.round((v - 25569) * 86400 * 1000);
        return toIsoDate(new Date(ms));
      }
      if (typeof v === 'string') {
        const s = v.trim();
        if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
        const d = new Date(s);
        if (!isNaN(d)) return toIsoDate(d);
      }
      return null;
    }

    function parseIso(s) {
      // parse YYYY-MM-DD as UTC midnight to avoid timezone drift
      if (!s) return null;
      const [y, m, d] = s.split('-').map(Number);
      return new Date(Date.UTC(y, m - 1, d));
    }

    function addDays(iso, days) {
      const d = parseIso(iso);
      d.setUTCDate(d.getUTCDate() + days);
      return toIsoDate(d);
    }

    function daysBetween(a, b) {
      return Math.round((parseIso(b) - parseIso(a)) / (86400 * 1000));
    }

    function todayIso() { return toIsoDate(new Date()); }

    /* =========================================================
       Parsing
       ========================================================= */

    function normalizeStatus(raw) {
      if (raw == null || raw === '') return 'not_started';
      const key = String(raw).toLowerCase().replace(/[\s\-_]+/g, '');
      return STATUS_ALIAS_MAP[key] || null;
    }

    function slugify(s) {
      return String(s).toLowerCase()
        .replace(/[^\w\s-]/g, '')
        .trim()
        .replace(/[\s_-]+/g, '_')
        .replace(/^_+|_+$/g, '') || 'workstream';
    }

    function parseExcel(arrayBuffer) {
      const wb = XLSX.read(arrayBuffer, { type: 'array', cellDates: true });
      const firstSheetName = wb.SheetNames[0];
      if (!firstSheetName) throw new Error('Excel file has no sheets.');
      const ws = wb.Sheets[firstSheetName];
      const rows = XLSX.utils.sheet_to_json(ws, { raw: true, defval: null });
      if (rows.length === 0) throw new Error('The first worksheet is empty.');

      // Build a case-insensitive header lookup
      const headerKeys = Object.keys(rows[0]);
      const lookup = {};
      headerKeys.forEach(h => { lookup[h.trim().toLowerCase()] = h; });

      const findCol = (canonical) => {
        const synonyms = EXCEL_SYNONYMS[canonical];
        for (const syn of synonyms) {
          if (lookup[syn]) return lookup[syn];
        }
        return null;
      };

      const col = {
        name:       findCol('name'),
        workstream: findCol('workstream'),
        start:      findCol('start'),
        end:        findCol('end'),
        duration:   findCol('duration'),
        status:     findCol('status'),
      };

      const missing = [];
      if (!col.name)       missing.push(['name',       EXCEL_SYNONYMS.name]);
      if (!col.workstream) missing.push(['workstream', EXCEL_SYNONYMS.workstream]);
      if (!col.start)      missing.push(['start date', EXCEL_SYNONYMS.start]);
      if (!col.end && !col.duration)
        missing.push(['end date or duration', [...EXCEL_SYNONYMS.end, ...EXCEL_SYNONYMS.duration]]);

      if (missing.length > 0) {
        const lines = missing.map(([label, syns]) =>
          `  • Could not find a '${label}' column. Expected one of: ${syns.join(', ')}`
        );
        throw new Error(`Your Excel file is missing required columns:\n${lines.join('\n')}\n\nColumns found: ${headerKeys.join(', ')}`);
      }

      const workstreamMap = new Map(); // name -> id
      const tasks = [];
      const unmappedStatuses = new Set();

      rows.forEach((row, idx) => {
        const name = row[col.name];
        const wsName = row[col.workstream];
        if (name == null || name === '' || wsName == null || wsName === '') return; // skip blank

        const startIso = toIsoDate(row[col.start]);
        let endIso = col.end ? toIsoDate(row[col.end]) : null;
        const durationRaw = col.duration ? row[col.duration] : null;
        let duration = null;
        if (durationRaw != null && durationRaw !== '') {
          const n = Number(durationRaw);
          if (!isNaN(n)) duration = n;
        }

        if (startIso == null) return; // skip rows without a parseable start

        if (endIso == null && duration != null) {
          endIso = addDays(startIso, duration);
        }
        if (endIso == null) endIso = startIso;

        const isMilestone = (duration === 0) || (startIso === endIso);

        let wsId = workstreamMap.get(String(wsName));
        if (!wsId) {
          wsId = slugify(wsName);
          // dedupe collisions
          let base = wsId, n = 2;
          const existing = new Set(workstreamMap.values());
          while (existing.has(wsId)) { wsId = `${base}_${n++}`; }
          workstreamMap.set(String(wsName), wsId);
        }

        let status = null;
        if (col.status) {
          const raw = row[col.status];
          status = normalizeStatus(raw);
          if (!status && raw != null && raw !== '') {
            unmappedStatuses.add(String(raw));
            status = 'not_started';
          }
        }
        if (!status) status = 'not_started';

        tasks.push({
          id: `t-${String(idx + 1).padStart(3, '0')}`,
          name: String(name),
          workstream: wsId,
          start: startIso,
          end: isMilestone ? startIso : endIso,
          status,
          milestone: isMilestone,
        });
      });

      if (tasks.length === 0) {
        throw new Error('No valid tasks found in the first worksheet. Check that your rows have Task, Workstream, and Start Date values.');
      }

      const workstreams = [];
      for (const [name, id] of workstreamMap) {
        workstreams.push({ id, name: String(name), collapsed: false });
      }

      const title = firstSheetName && firstSheetName !== 'Sheet1' ? firstSheetName : 'Imported Timeline';

      const result = { title, workstreams, tasks };
      if (unmappedStatuses.size > 0) {
        result._warning = `Some status values were not recognized and defaulted to "Not Started": ${[...unmappedStatuses].join(', ')}`;
      }
      return result;
    }

    function parseYamlText(text) {
      const doc = jsyaml.load(text);
      if (!doc || typeof doc !== 'object') throw new Error('YAML file is empty or not an object.');
      const title = doc.title || 'Untitled Timeline';
      const workstreams = Array.isArray(doc.workstreams) ? doc.workstreams.map(w => ({
        id: String(w.id),
        name: String(w.name || w.id),
        collapsed: !!w.collapsed,
      })) : [];
      const tasks = Array.isArray(doc.tasks) ? doc.tasks.map((t, i) => ({
        id: String(t.id || `t-${String(i + 1).padStart(3, '0')}`),
        name: String(t.name || ''),
        workstream: String(t.workstream || (workstreams[0] && workstreams[0].id) || 'default'),
        start: toIsoDate(t.start),
        end: toIsoDate(t.end) || toIsoDate(t.start),
        status: normalizeStatus(t.status) || 'not_started',
        milestone: !!t.milestone,
      })) : [];
      // ensure every task's workstream exists
      const wsIds = new Set(workstreams.map(w => w.id));
      tasks.forEach(t => {
        if (!wsIds.has(t.workstream)) {
          if (workstreams.length === 0) {
            workstreams.push({ id: 'default', name: 'Default', collapsed: false });
            wsIds.add('default');
          }
          t.workstream = workstreams[0].id;
        }
      });
      return { title, workstreams, tasks };
    }

    function serializeYaml(state) {
      const doc = {
        title: state.title,
        generated: todayIso(),
        workstreams: state.workstreams.map(w => ({
          id: w.id,
          name: w.name,
          collapsed: w.collapsed,
        })),
        tasks: state.tasks.map(t => ({
          id: t.id,
          name: t.name,
          workstream: t.workstream,
          start: t.start,
          end: t.end,
          status: t.status,
          milestone: t.milestone,
        })),
      };
      return jsyaml.dump(doc, { lineWidth: 120, noRefs: true });
    }

    /* =========================================================
       Task table (left pane)
       ========================================================= */

    function TaskTable({ title, setTitle, tasks, workstreams, onEdit, onDelete, onAddTask, onAddWorkstream }) {
      // Group tasks by workstream for display
      const grouped = useMemo(() => {
        const byWs = new Map();
        workstreams.forEach(w => byWs.set(w.id, []));
        tasks.forEach(t => {
          if (!byWs.has(t.workstream)) byWs.set(t.workstream, []);
          byWs.get(t.workstream).push(t);
        });
        return byWs;
      }, [tasks, workstreams]);

      return (
        <table className="tasks">
          <thead>
            <tr>
              <th className="name-col">Task</th>
              <th>Start</th>
              <th>End</th>
              <th>Status</th>
              <th title="Milestone">M</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {workstreams.map(ws => {
              const wsTasks = grouped.get(ws.id) || [];
              return (
                <React.Fragment key={ws.id}>
                  <tr className="group-header">
                    <td colSpan="6">
                      {ws.name} ({wsTasks.length})
                    </td>
                  </tr>
                  {wsTasks.map(t => (
                    <tr key={t.id}>
                      <td className="name-col">
                        <input
                          type="text"
                          value={t.name}
                          onChange={e => onEdit(t.id, { name: e.target.value })}
                        />
                      </td>
                      <td className="date-col">
                        <input
                          type="date"
                          value={t.start || ''}
                          onChange={e => onEdit(t.id, { start: e.target.value, end: t.milestone ? e.target.value : t.end })}
                        />
                      </td>
                      <td className="date-col">
                        <input
                          type="date"
                          value={t.end || ''}
                          disabled={t.milestone}
                          onChange={e => onEdit(t.id, { end: e.target.value })}
                        />
                      </td>
                      <td>
                        <select
                          value={t.status}
                          onChange={e => onEdit(t.id, { status: e.target.value })}
                        >
                          {STATUS_ORDER.map(s => (
                            <option key={s} value={s}>{STATUS_LABEL[s]}</option>
                          ))}
                        </select>
                      </td>
                      <td style={{ textAlign: 'center' }}>
                        <input
                          type="checkbox"
                          checked={t.milestone}
                          onChange={e => {
                            const m = e.target.checked;
                            onEdit(t.id, m ? { milestone: true, end: t.start } : { milestone: false });
                          }}
                        />
                      </td>
                      <td className="actions-col">
                        <button onClick={() => onDelete(t.id)} title="Delete task">×</button>
                      </td>
                    </tr>
                  ))}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
      );
    }

    /* =========================================================
       Gantt chart (right pane, SVG)
       ========================================================= */

    const LABEL_WIDTH = 240;
    const AXIS_HEIGHT = 48;
    const ROW_HEIGHT = 28;
    const WS_HEADER_HEIGHT = 32;
    const BAR_HEIGHT = 16;
    const MIN_PX_PER_DAY = 3;
    const MAX_PX_PER_DAY = 12;

    function computeDateRange(tasks) {
      if (tasks.length === 0) {
        const today = todayIso();
        return { start: today, end: addDays(today, 90) };
      }
      let minStart = tasks[0].start;
      let maxEnd = tasks[0].end;
      tasks.forEach(t => {
        if (t.start && t.start < minStart) minStart = t.start;
        if (t.end && t.end > maxEnd) maxEnd = t.end;
      });
      // pad by one week each side, snap to month boundaries
      const padStart = addDays(minStart, -14);
      const padEnd = addDays(maxEnd, 14);
      const s = parseIso(padStart);
      const e = parseIso(padEnd);
      const start = `${s.getUTCFullYear()}-${String(s.getUTCMonth() + 1).padStart(2, '0')}-01`;
      // end of the month of padEnd
      const lastMonth = new Date(Date.UTC(e.getUTCFullYear(), e.getUTCMonth() + 1, 0));
      const end = toIsoDate(lastMonth);
      return { start, end };
    }

    function monthBoundariesBetween(startIso, endIso) {
      const out = [];
      const start = parseIso(startIso);
      const end = parseIso(endIso);
      let y = start.getUTCFullYear();
      let m = start.getUTCMonth();
      while (true) {
        const d = new Date(Date.UTC(y, m, 1));
        if (d > end) break;
        out.push({
          date: toIsoDate(d),
          year: y,
          month: m,
          isQuarter: m % 3 === 0,
          isYear: m === 0,
        });
        m++;
        if (m > 11) { m = 0; y++; }
      }
      return out;
    }

    const MONTH_LABELS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    const GanttChart = React.forwardRef(function GanttChart({ tasks, workstreams, onToggleCollapse, title }, svgRef) {
      const dateRange = useMemo(() => computeDateRange(tasks), [tasks]);
      const totalDays = Math.max(1, daysBetween(dateRange.start, dateRange.end));

      // Choose pixel scale to fit a reasonable width, clamped
      const pxPerDay = Math.min(MAX_PX_PER_DAY, Math.max(MIN_PX_PER_DAY, 1400 / totalDays));

      const xForDate = iso => {
        if (!iso) return LABEL_WIDTH;
        return LABEL_WIDTH + daysBetween(dateRange.start, iso) * pxPerDay;
      };

      const chartWidth = LABEL_WIDTH + totalDays * pxPerDay + 24;

      // Lay out rows
      const rows = [];
      let y = AXIS_HEIGHT;
      workstreams.forEach(ws => {
        const wsTasks = tasks.filter(t => t.workstream === ws.id);
        rows.push({ type: 'ws', ws, y, tasks: wsTasks });
        y += WS_HEADER_HEIGHT;
        if (!ws.collapsed) {
          wsTasks.forEach(t => {
            rows.push({ type: 'task', task: t, y });
            y += ROW_HEIGHT;
          });
        }
      });
      const chartHeight = y + 12;

      const months = monthBoundariesBetween(dateRange.start, dateRange.end);

      return (
        <svg
          ref={svgRef}
          xmlns="http://www.w3.org/2000/svg"
          width={chartWidth}
          height={chartHeight}
          viewBox={`0 0 ${chartWidth} ${chartHeight}`}
          style={{ display: 'block', fontFamily: '-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif', fontSize: 12, background: '#ffffff' }}
        >
          {/* Title */}
          <text x="16" y="22" fontSize="15" fontWeight="600" fill="#111827">{title}</text>

          {/* Month/quarter gridlines */}
          {months.map(m => {
            const x = xForDate(m.date);
            return (
              <g key={m.date}>
                <line
                  x1={x} x2={x}
                  y1={AXIS_HEIGHT - 18} y2={chartHeight}
                  stroke={m.isQuarter ? '#d1d5db' : '#f3f4f6'}
                  strokeWidth={m.isQuarter ? 1 : 1}
                />
                <text
                  x={x + 4}
                  y={AXIS_HEIGHT - 4}
                  fill={m.isQuarter ? '#374151' : '#9ca3af'}
                  fontSize={m.isQuarter ? 11 : 10}
                  fontWeight={m.isQuarter ? 600 : 400}
                >
                  {m.isYear ? `${MONTH_LABELS[m.month]} ${m.year}` : MONTH_LABELS[m.month]}
                </text>
              </g>
            );
          })}

          {/* Axis baseline */}
          <line x1={LABEL_WIDTH} x2={chartWidth} y1={AXIS_HEIGHT} y2={AXIS_HEIGHT} stroke="#d1d5db" />
          <line x1={LABEL_WIDTH} x2={LABEL_WIDTH} y1={0} y2={chartHeight} stroke="#e5e7eb" />

          {/* Rows */}
          {rows.map((row, i) => {
            if (row.type === 'ws') {
              const { ws, y, tasks: wsTasks } = row;
              // zebra background
              return (
                <g key={`ws-${ws.id}-${i}`}>
                  <rect x="0" y={y} width={chartWidth} height={WS_HEADER_HEIGHT} fill="#f9fafb" />
                  <line x1="0" x2={chartWidth} y1={y} y2={y} stroke="#e5e7eb" />
                  <text
                    x="16"
                    y={y + WS_HEADER_HEIGHT / 2 + 4}
                    fontWeight="700"
                    fontSize="12"
                    fill="#374151"
                    style={{ cursor: 'pointer', userSelect: 'none' }}
                    onClick={() => onToggleCollapse(ws.id)}
                  >
                    {ws.collapsed ? '▸' : '▾'} {ws.name.toUpperCase()} ({wsTasks.length})
                  </text>
                  {ws.collapsed && wsTasks.length > 0 && (() => {
                    const minStart = wsTasks.reduce((a, t) => t.start < a ? t.start : a, wsTasks[0].start);
                    const maxEnd = wsTasks.reduce((a, t) => t.end > a ? t.end : a, wsTasks[0].end);
                    const x1 = xForDate(minStart);
                    const x2 = xForDate(maxEnd);
                    return (
                      <rect
                        x={x1}
                        y={y + (WS_HEADER_HEIGHT - 10) / 2}
                        width={Math.max(4, x2 - x1)}
                        height="10"
                        rx="3"
                        fill="#9ca3af"
                        opacity="0.6"
                      />
                    );
                  })()}
                </g>
              );
            } else {
              const { task, y } = row;
              const color = STATUS_COLORS[task.status] || STATUS_COLORS.not_started;
              const cy = y + ROW_HEIGHT / 2;
              return (
                <g key={task.id}>
                  {/* Row separator */}
                  <line x1="0" x2={chartWidth} y1={y} y2={y} stroke="#f3f4f6" />
                  {/* Label */}
                  <text
                    x="28"
                    y={cy + 4}
                    fill="#374151"
                    fontSize="12"
                  >
                    {task.name.length > 30 ? task.name.slice(0, 29) + '…' : task.name}
                  </text>
                  {/* Bar or diamond */}
                  {task.milestone ? (
                    (() => {
                      const cx = xForDate(task.start);
                      const half = 9;
                      const points = `${cx},${cy - half} ${cx + half},${cy} ${cx},${cy + half} ${cx - half},${cy}`;
                      return (
                        <g>
                          <polygon
                            points={points}
                            fill={color}
                            stroke="#111827"
                            strokeWidth="1"
                          />
                        </g>
                      );
                    })()
                  ) : (
                    (() => {
                      const x1 = xForDate(task.start);
                      const x2 = xForDate(task.end);
                      const w = Math.max(3, x2 - x1);
                      const isEstimate = task.status === 'estimate';
                      return (
                        <rect
                          x={x1}
                          y={cy - BAR_HEIGHT / 2}
                          width={w}
                          height={BAR_HEIGHT}
                          rx="3"
                          fill={color}
                          fillOpacity={isEstimate ? 0.35 : 1}
                          stroke={isEstimate ? color : 'none'}
                          strokeWidth={isEstimate ? 1.5 : 0}
                          strokeDasharray={isEstimate ? '4 3' : ''}
                        />
                      );
                    })()
                  )}
                </g>
              );
            }
          })}

          {/* Legend */}
          <g transform={`translate(16, ${chartHeight - 4})`}>
            {/* intentionally empty — legend is drawn at top-right */}
          </g>
          <g transform={`translate(${chartWidth - 16}, 22)`} textAnchor="end">
            {STATUS_ORDER.map((s, i) => {
              const xOffset = -(STATUS_ORDER.length - i) * 88;
              return (
                <g key={s} transform={`translate(${xOffset}, 0)`}>
                  <rect x="0" y="-10" width="12" height="12" rx="2" fill={STATUS_COLORS[s]} fillOpacity={s === 'estimate' ? 0.35 : 1} stroke={s === 'estimate' ? STATUS_COLORS[s] : 'none'} strokeDasharray={s === 'estimate' ? '2 2' : ''}/>
                  <text x="16" y="0" fontSize="10" fill="#6b7280" textAnchor="start">{STATUS_LABEL[s]}</text>
                </g>
              );
            })}
          </g>
        </svg>
      );
    });

    /* =========================================================
       Export helpers
       ========================================================= */

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function serializeSvg(svgEl) {
      const clone = svgEl.cloneNode(true);
      clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
      clone.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');
      return new XMLSerializer().serializeToString(clone);
    }

    function downloadSvg(svgEl, filename) {
      const str = serializeSvg(svgEl);
      const blob = new Blob(['<?xml version="1.0" encoding="UTF-8"?>\n', str], { type: 'image/svg+xml' });
      downloadBlob(blob, filename);
    }

    function downloadPng(svgEl, filename) {
      const str = serializeSvg(svgEl);
      const width = Number(svgEl.getAttribute('width'));
      const height = Number(svgEl.getAttribute('height'));
      const scale = Math.max(2, window.devicePixelRatio || 1);
      const blob = new Blob([str], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = width * scale;
        canvas.height = height * scale;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.setTransform(scale, 0, 0, scale, 0, 0);
        ctx.drawImage(img, 0, 0);
        canvas.toBlob(b => {
          URL.revokeObjectURL(url);
          if (b) downloadBlob(b, filename);
        }, 'image/png');
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        alert('PNG export failed. Try Download SVG instead — it works in PowerPoint too.');
      };
      img.src = url;
    }

    /* =========================================================
       App
       ========================================================= */

    function App() {
      const [state, setState] = useState({
        title: FALLBACK_SAMPLE.title,
        workstreams: FALLBACK_SAMPLE.workstreams,
        tasks: FALLBACK_SAMPLE.tasks,
      });
      const [error, setError] = useState(null);
      const [dragging, setDragging] = useState(false);
      const [leftWidth, setLeftWidth] = useState(42);
      const [divDragging, setDivDragging] = useState(false);
      const svgRef = useRef(null);

      // Try to fetch sample-timeline.yaml alongside the HTML (works on http, may fail on file://)
      useEffect(() => {
        let cancelled = false;
        fetch('sample-timeline.yaml')
          .then(r => r.ok ? r.text() : Promise.reject())
          .then(text => {
            if (cancelled) return;
            try {
              const parsed = parseYamlText(text);
              setState(parsed);
            } catch (e) { /* ignore, use fallback */ }
          })
          .catch(() => { /* fallback sample already loaded */ });
        return () => { cancelled = true; };
      }, []);

      // Drag-drop file loading
      useEffect(() => {
        const onDragOver = (e) => { e.preventDefault(); setDragging(true); };
        const onDragLeave = (e) => {
          if (e.target === document || e.target === document.documentElement || e.relatedTarget == null) setDragging(false);
        };
        const onDrop = (e) => {
          e.preventDefault();
          setDragging(false);
          const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
          if (file) loadFile(file);
        };
        window.addEventListener('dragover', onDragOver);
        window.addEventListener('dragleave', onDragLeave);
        window.addEventListener('drop', onDrop);
        return () => {
          window.removeEventListener('dragover', onDragOver);
          window.removeEventListener('dragleave', onDragLeave);
          window.removeEventListener('drop', onDrop);
        };
      }, []);

      // Divider drag
      useEffect(() => {
        if (!divDragging) return;
        const onMove = (e) => {
          const pct = Math.max(20, Math.min(70, (e.clientX / window.innerWidth) * 100));
          setLeftWidth(pct);
        };
        const onUp = () => setDivDragging(false);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        return () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
        };
      }, [divDragging]);

      const loadFile = useCallback(async (file) => {
        setError(null);
        const name = file.name.toLowerCase();
        try {
          if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
            const buf = await file.arrayBuffer();
            const parsed = parseExcel(buf);
            setState({ title: parsed.title, workstreams: parsed.workstreams, tasks: parsed.tasks });
            if (parsed._warning) setError(parsed._warning);
          } else if (name.endsWith('.yaml') || name.endsWith('.yml')) {
            const text = await file.text();
            const parsed = parseYamlText(text);
            setState(parsed);
          } else if (name.endsWith('.json')) {
            const text = await file.text();
            const doc = JSON.parse(text);
            const parsed = parseYamlText(jsyaml.dump(doc));
            setState(parsed);
          } else {
            throw new Error(`Unsupported file type: ${file.name}\nExpected .xlsx, .xls, .yaml, .yml, or .json.`);
          }
        } catch (e) {
          setError(e.message || String(e));
        }
      }, []);

      const onEditTask = useCallback((id, patch) => {
        setState(s => ({
          ...s,
          tasks: s.tasks.map(t => t.id === id ? { ...t, ...patch } : t),
        }));
      }, []);

      const onDeleteTask = useCallback((id) => {
        setState(s => ({ ...s, tasks: s.tasks.filter(t => t.id !== id) }));
      }, []);

      const onAddTask = useCallback(() => {
        setState(s => {
          const nextNum = s.tasks.reduce((m, t) => {
            const n = parseInt((t.id.match(/\d+/) || ['0'])[0], 10);
            return Math.max(m, n);
          }, 0) + 1;
          const start = todayIso();
          const end = addDays(start, 14);
          const ws = s.workstreams[0];
          if (!ws) {
            return s;
          }
          return {
            ...s,
            tasks: [...s.tasks, {
              id: `t-${String(nextNum).padStart(3, '0')}`,
              name: 'New task',
              workstream: ws.id,
              start,
              end,
              status: 'not_started',
              milestone: false,
            }],
          };
        });
      }, []);

      const onAddWorkstream = useCallback(() => {
        const name = prompt('Workstream name:');
        if (!name) return;
        setState(s => {
          let id = slugify(name);
          const existing = new Set(s.workstreams.map(w => w.id));
          let base = id, n = 2;
          while (existing.has(id)) { id = `${base}_${n++}`; }
          return { ...s, workstreams: [...s.workstreams, { id, name, collapsed: false }] };
        });
      }, []);

      const onToggleCollapse = useCallback((wsId) => {
        setState(s => ({
          ...s,
          workstreams: s.workstreams.map(w => w.id === wsId ? { ...w, collapsed: !w.collapsed } : w),
        }));
      }, []);

      const onFilePicked = useCallback((e) => {
        const file = e.target.files && e.target.files[0];
        if (file) loadFile(file);
        e.target.value = ''; // allow re-picking the same file
      }, [loadFile]);

      const fileInputRef = useRef(null);

      return (
        <>
          <header>
            <h1>Timeline Editor</h1>
            <input
              className="title-input"
              type="text"
              value={state.title}
              onChange={e => setState(s => ({ ...s, title: e.target.value }))}
            />
            <div className="spacer" />
            <input
              ref={fileInputRef}
              type="file"
              accept=".xlsx,.xls,.yaml,.yml,.json"
              style={{ display: 'none' }}
              onChange={onFilePicked}
            />
            <button onClick={() => fileInputRef.current.click()}>Open File</button>
            <button onClick={onAddTask}>+ Task</button>
            <button onClick={onAddWorkstream}>+ Workstream</button>
            <button onClick={() => svgRef.current && downloadPng(svgRef.current, `${slugify(state.title)}.png`)}>Download PNG</button>
            <button onClick={() => svgRef.current && downloadSvg(svgRef.current, `${slugify(state.title)}.svg`)}>Download SVG</button>
            <button className="primary" onClick={() => {
              const yaml = serializeYaml(state);
              downloadBlob(new Blob([yaml], { type: 'text/yaml' }), `${slugify(state.title)}.yaml`);
            }}>Download YAML</button>
          </header>
          {error && (
            <div className="error-banner">
              <pre>{error}</pre>
              <button onClick={() => setError(null)}>Dismiss</button>
            </div>
          )}
          <main style={{ '--left-width': `${leftWidth}%` }}>
            <div className="pane left">
              <TaskTable
                title={state.title}
                setTitle={(t) => setState(s => ({ ...s, title: t }))}
                tasks={state.tasks}
                workstreams={state.workstreams}
                onEdit={onEditTask}
                onDelete={onDeleteTask}
              />
            </div>
            <div
              className={`divider ${divDragging ? 'dragging' : ''}`}
              onMouseDown={() => setDivDragging(true)}
            />
            <div className="pane">
              {state.tasks.length === 0 ? (
                <div className="empty-state">
                  No tasks yet. Click <b>+ Task</b> or drop an Excel file on the page.
                </div>
              ) : (
                <GanttChart
                  ref={svgRef}
                  title={state.title}
                  tasks={state.tasks}
                  workstreams={state.workstreams}
                  onToggleCollapse={onToggleCollapse}
                />
              )}
            </div>
          </main>
          {dragging && <div className="drop-overlay">Drop your Excel or YAML file</div>}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
